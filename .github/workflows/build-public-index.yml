name: Build Public Index

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-public-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build tx_index.json
        run: python scripts/build_index.py

      - name: Build public_tx_index.json
        run: python scripts/filter_public_index.py

      - name: Commit public index
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: auto build public TX index
