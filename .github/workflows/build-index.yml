name: Build TX Index

on:
  push:
    paths:
      - "archive/**/*.md"
      - "scripts/build_index.py"
      - "core/**"
      - "data/categories.json"
      - "data/tags.json"
      - "data/related_map.json"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build tx_index.json
        run: python scripts/build_index.py

      - name: Commit updated tx_index.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update tx_index.json"
          file_pattern: data/tx_index.json
