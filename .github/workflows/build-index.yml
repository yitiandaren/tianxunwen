name: Build TX Index

on:
  push:
    paths:
      - "archive/**/*.md"
      - "scripts/build_index.py"
      - "scripts/validate_tx.py"
      - "scripts/audit_metadata.py"
      - "core/**"
      - "data/categories.json"
      - "data/tags.json"
      - "data/related_map.json"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-build-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate TX files
        run: python scripts/validate_tx.py

      - name: Build tx_index.json
        run: python scripts/build_index.py

      - name: Audit metadata
        run: python scripts/audit_metadata.py

      - name: Commit updated data files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update tx index and metadata audit"
          file_pattern: data/tx_index.json data/metadata_audit.json
