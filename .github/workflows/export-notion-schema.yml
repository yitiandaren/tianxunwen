name: Export Notion Schema

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export-notion-schema:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Export Notion schema
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: python scripts/export_notion_schema.py

      - name: Commit Notion schema inventory
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: auto export notion schema inventory
