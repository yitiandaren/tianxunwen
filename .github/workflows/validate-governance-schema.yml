name: Validate Governance Schema

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-governance-schema:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate governance schema
        run: python scripts/compare_notion_github_schema.py

      - name: Commit schema validation report
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: auto validate governance schema
