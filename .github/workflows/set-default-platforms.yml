name: Set Default Platforms

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  set-default-platforms:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Set default published platforms
        run: python scripts/set_default_platforms.py

      - name: Validate TX files
        run: python scripts/validate_tx.py

      - name: Build tx_index.json
        run: python scripts/build_index.py

      - name: Audit metadata
        run: python scripts/audit_metadata.py

      - name: Commit default platforms
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: auto set default published platforms
