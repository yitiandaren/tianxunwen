name: Enrich TX Metadata

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich-tx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Enrich TX metadata
        run: python scripts/enrich_tx.py

      - name: Validate TX files
        run: python scripts/validate_tx.py

      - name: Build tx_index.json
        run: python scripts/build_index.py

      - name: Audit metadata
        run: python scripts/audit_metadata.py

      - name: Commit enriched metadata
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: enrich TX metadata"
          file_pattern: "archive/*.md data/tx_index.json data/metadata_audit.json"          commit_message: "auto: enrich TX metadata"
          file_pattern: "archive/*.md data/tx_index.json data/metadata_audit.json"
