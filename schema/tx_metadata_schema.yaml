version: "2.0"

required_fields:

  - tx_id
  - subject
  - source_author
  - source_type
  - show_time

  - content_status
  - visibility

  - keywords
  - related_ids

optional_fields:

  - old_id
  - publish_code
  - category
  - tags

  - editor_intro
  - open_question
  - meta_description

  - semantic_cluster
  - topic_family

  - published_platforms
  - og_image
  - canonical_url

  - license

allowed_content_status:

  - raw
  - processing
  - structured
  - reviewed
  - publish_ready
  - published
  - archived_internal
  - restricted

allowed_visibility:

  - public
  - internal
  - restricted
  - private

required_array_fields:

  - keywords
  - related_ids

recommended_array_fields:

  - tags
  - published_platforms

field_types:

  tx_id: string
  subject: string
  source_author: string
  source_type: string

  show_time: string

  content_status: string
  visibility: string

  category: string

  keywords: list
  related_ids: list

  tags: list
  published_platforms: list

  meta_description: string
  editor_intro: string
  open_question: string

governance:

  original_text_editable: false

  metadata_editable: true

  ai_embedding_allowed: true

  ai_external_training_allowed: false
